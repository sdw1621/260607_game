<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>웹앱 포트폴리오</title>
  <style>
    :root {
      --bg: #faf8ef;
      --text: #776e65;
      --muted: #a89e92;
      --card-bg: #ffffff;
      --accent: #8f7a66;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }
    header h1 {
      font-size: 2.4rem;
      margin: 0 0 8px;
    }
    header p {
      color: var(--muted);
      margin: 0 0 40px;
      font-size: 1.05rem;
    }
    .section-title {
      font-size: 1.3rem;
      margin: 0 0 20px;
      padding-bottom: 8px;
      border-bottom: 2px solid #eee4da;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }
    .card {
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(119, 110, 101, 0.12);
      display: flex;
      flex-direction: column;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(119, 110, 101, 0.2);
    }
    .card-preview {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 10;
      background: #bbada0;
      overflow: hidden;
    }
    .card-preview iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
      pointer-events: none;
    }
    .card-body {
      padding: 18px 20px 22px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .card-body h3 {
      margin: 0 0 6px;
      font-size: 1.2rem;
    }
    .card-body p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 0.95rem;
      flex: 1;
    }
    .card-body a.play {
      align-self: flex-start;
      background: var(--accent);
      color: #f9f6f2;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.95rem;
    }
    .card-body a.play:hover { background: #9f8b77; }
    footer {
      margin-top: 64px;
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>웹앱 포트폴리오</h1>
      <p>마크다운 기반 블로그 + 직접 만든 미니 웹앱 모음</p>
    </header>

    <main>
      <h2 class="section-title">웹앱</h2>
      <div class="cards">

        <!-- 2048 -->
        <article class="card">
          <div class="card-preview">
            <iframe src="apps/2048/index.html" title="2048 게임 미리보기" scrolling="no" tabindex="-1"></iframe>
          </div>
          <div class="card-body">
            <h3>2048</h3>
            <p>방향키나 스와이프로 숫자 타일을 밀어 같은 숫자끼리 합치는 퍼즐 게임. 현재 점수와 최고 점수를 기록합니다.</p>
            <a class="play" href="apps/2048/index.html">플레이 &rarr;</a>
          </div>
        </article>

      </div>
    </main>

    <footer>
      © 2026 웹앱 포트폴리오
    </footer>
  </div>
</body>
</html>
