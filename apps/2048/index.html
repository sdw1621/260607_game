<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <title>2048</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <header class="header">
      <h1 class="title">2048</h1>
      <div class="scores">
        <div class="score-box">
          <div class="score-label">점수</div>
          <div class="score-value" id="score" aria-live="polite">0</div>
        </div>
        <div class="score-box">
          <div class="score-label">최고</div>
          <div class="score-value" id="best" aria-live="polite">0</div>
        </div>
      </div>
    </header>

    <section class="subheader">
      <p class="intro">
        타일을 합쳐 <strong>2048</strong>을 만드세요!
      </p>
      <button type="button" class="btn-new" id="new-game">새 게임</button>
    </section>

    <div class="board-wrap">
      <div class="grid" id="grid" aria-hidden="true">
        <!-- 16 background cells -->
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      </div>

      <div class="tiles" id="tiles" role="grid" aria-label="2048 보드"></div>

      <div class="overlay" id="overlay" hidden>
        <div class="overlay-content">
          <p class="overlay-message" id="overlay-message"></p>
          <div class="overlay-buttons">
            <button type="button" class="btn-keep" id="keep-going" hidden>계속하기</button>
            <button type="button" class="btn-retry" id="retry">다시 시작</button>
          </div>
        </div>
      </div>
    </div>

    <footer class="footer">
      <p>← ↑ → ↓ 방향키 또는 화면을 스와이프하여 타일을 움직이세요.</p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
