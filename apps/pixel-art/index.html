<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>픽셀 아트 에디터</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>픽셀 아트 에디터</h1>
      <p class="subtitle">16×16 격자에 도트를 찍어 작은 픽셀 그림을 그려보세요.</p>
    </header>

    <section class="toolbar" aria-label="도구">
      <div class="palette" id="palette" aria-label="색상 팔레트"></div>

      <div class="tools">
        <label class="custom-color">
          <span>커스텀</span>
          <input type="color" id="custom-color" value="#776e65" />
        </label>

        <div class="current" aria-label="현재 선택 색">
          <span>현재 색</span>
          <span class="current-swatch" id="current-swatch"></span>
        </div>

        <button type="button" id="eraser-btn" class="tool-btn" aria-pressed="false">지우개</button>
      </div>
    </section>

    <section class="board-wrap">
      <div class="board" id="board" role="grid" aria-label="픽셀 보드"></div>
    </section>

    <section class="actions">
      <button type="button" id="clear-btn" class="action-btn">전체 지우기</button>
      <button type="button" id="save-btn" class="action-btn primary">PNG 저장</button>
    </section>

    <footer class="footer">
      <p>클릭/드래그(모바일은 터치)로 칠하세요. 색을 고르거나 커스텀 색을 선택하고, 지우개로 지울 수 있습니다.</p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
